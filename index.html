<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精準百家樂預測 - 自適應版 v3</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #111827; color: white; margin: 0; padding: 0; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; font-size: 2.5rem; color: #facc15; margin-bottom: 20px; }
        .card { background: #1f2937; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        button { width: 100%; padding: 18px; font-size: 1.5rem; font-weight: bold; border: none; border-radius: 12px; margin-bottom: 10px; transition: all 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-b { background: #ef4444; }
        .btn-p { background: #3b82f6; }
        .btn-t { background: #22c55e; }
        .debug { font-size: 0.9rem; color: #9ca3af; margin-top: 15px; }
        canvas { background: #27272a; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>精準百家樂預測 - 自適應版 v3</h1>
        
        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 20px;">
            <div class="card">
                <h2 style="margin-bottom:15px;">點擊直接新增開牌</h2>
                <button id="btnB" class="btn-b">莊</button>
                <button id="btnP" class="btn-p">閒</button>
                <button id="btnT" class="btn-t">和</button>

                <div style="margin-top:25px; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <button id="btnUndo" style="background:#4b5563;">↩ 刪除上一筆</button>
                    <button id="btnClear" style="background:#f59e0b;">🗑 清空全部</button>
                </div>
            </div>

            <div class="card">
                <h2>開牌歷史</h2>
                <div id="historyList" style="background:#111827; padding:15px; height:220px; overflow-y:auto; border-radius:12px; margin-bottom:20px; font-family:monospace;"></div>
                <h2>大路路單</h2>
                <canvas id="bigRoad" width="720" height="300"></canvas>
            </div>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2>🔮 自適應 AI 預測（20筆以上）</h2>
                <button id="btnRecalc" style="background:#6366f1; padding:10px 20px; font-size:1rem; border-radius:9999px;">🔄 重新計算</button>
            </div>
            <div id="prediction" style="text-align:center; min-height:180px; font-size:1.4rem;"></div>
            <div id="debug" class="debug"></div>
        </div>
    </div>

    <script>
        let history = [];
        let pastPreds = [];
        let markovAcc = 0.5;
        let multiAcc = 0.5;
        let streakAcc = 0.5;
        let pairTendAcc = 0.5;
        let jumpAcc = 0.5;
        const STORAGE_KEY = 'baccaratHistory';

        function loadData() { 
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) history = JSON.parse(saved);
        }
        function saveData() { 
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        }

        function updateHistoryList() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            history.forEach((h, i) => {
                const div = document.createElement('div');
                let str = `${i+1}. ${h.winner === 'B' ? '🟥莊' : h.winner === 'P' ? '🟦閒' : '🟩和'}`;
                div.textContent = str;
                list.appendChild(div);
            });
        }

        function drawBigRoad() {
            const canvas = document.getElementById('bigRoad');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cell = 48;
            const visibleCols = Math.floor(canvas.width / cell);
            let columns = [];
            let currentCol = [];
            history.forEach(h => {
                if (h.winner === 'T') {
                    if (currentCol.length > 0) currentCol[currentCol.length-1].tie = (currentCol[currentCol.length-1].tie || 0) + 1;
                    return;
                }
                if (currentCol.length > 0 && currentCol[currentCol.length-1].winner === h.winner && currentCol.length < 6) {
                    currentCol.push({winner: h.winner, tie: 0});
                } else {
                    columns.push(currentCol);
                    currentCol = [{winner: h.winner, tie: 0}];
                }
            });
            if (currentCol.length > 0) columns.push(currentCol);

            const startCol = Math.max(0, columns.length - visibleCols);
            columns.slice(startCol).forEach((col, colIdx) => {
                col.forEach((bead, rowIdx) => {
                    const x = colIdx * cell + 6;
                    const y = rowIdx * cell + 6;
                    ctx.fillStyle = bead.winner === 'B' ? '#ef4444' : '#3b82f6';
                    ctx.beginPath(); ctx.arc(x + 18, y + 18, 18, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 22px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(bead.winner === 'B' ? '莊' : '閒', x + 18, y + 27);
                    if (bead.tie > 0) {
                        ctx.fillStyle = '#22c55e';
                        ctx.font = 'bold 16px Arial';
                        ctx.fillText(bead.tie > 1 ? bead.tie : '和', x + 18, y + 42);
                    }
                });
            });
        }

        function showPrediction() {
            const predDiv = document.getElementById('prediction');
            const debugDiv = document.getElementById('debug');
            if (history.length < 20) {
                predDiv.innerHTML = `<span style="color:#fcd34d;">需要20筆以上資料<br>目前 ${history.length} 筆</span>`;
                return;
            }

            const states = ['B', 'P', 'T'];
            const transMatrix = states.map(() => states.map(() => 0));
            for (let i = 1; i < history.length; i++) {
                const prev = states.indexOf(history[i-1].winner);
                const curr = states.indexOf(history[i].winner);
                transMatrix[prev][curr]++;
            }
            const lastIdx = states.indexOf(history[history.length-1].winner);
            const total = transMatrix[lastIdx].reduce((a,b)=>a+b,0) || 1;
            const markovProb = transMatrix[lastIdx].map(c => c/total*100);

            let multiPred = {B:0, P:0, T:0};
            for (let len = 3; len <= 20; len++) {
                if (history.length < len+1) continue;
                const lastSeq = history.slice(-len).map(h=>h.winner);
                let cand = [];
                for (let i = 0; i < history.length-len; i++) {
                    if (JSON.stringify(history.slice(i,i+len).map(h=>h.winner)) === JSON.stringify(lastSeq)) {
                        cand.push(history[i+len].winner);
                    }
                }
                if (cand.length) cand.forEach(c => multiPred[c] += (1/len)*cand.length);
            }
            const multiTotal = Object.values(multiPred).reduce((a,b)=>a+b,0) || 1;
            const multiProb = Object.keys(multiPred).reduce((o,k)=>{o[k]=multiPred[k]/multiTotal*100; return o;},{});

            let streak = 1;
            let streakDir = history[history.length-1].winner;
            for (let i = history.length-2; i>=0; i--) {
                if (history[i].winner === streakDir) streak++;
                else break;
            }
            const streakWeight = streak > 3 ? streak/10*10 : 0;

            const bPairRate = history.filter(h => h.bPair).length / history.length * 100 || 0;
            const pairTendProb = {B: bPairRate, P: 100 - bPairRate};

            const recentStreak = streak > 5 ? 0.7 : streak > 3 ? 0.55 : 0.45;
            const jumpProb = {B: recentStreak, P: 1 - recentStreak};

            const markovWeight = 0.25 + (markovAcc - 0.5) * 0.7;
            const multiWeight = 0.25 + (multiAcc - 0.5) * 0.7;
            const streakW = 0.15 + (streakAcc - 0.5) * 0.4;
            const pairWeight = 0.15 + (pairTendAcc - 0.5) * 0.3;
            const jumpWeight = 0.1 + (jumpAcc - 0.5) * 0.3;

            let scoreB = markovProb[0] * markovWeight + multiProb.B * multiWeight + 
                        (streakDir === 'B' ? streakWeight : 0) + 
                        pairTendProb.B * pairWeight + jumpProb.B * jumpWeight + 20;
            let scoreP = markovProb[1] * markovWeight + multiProb.P * multiWeight + 
                        (streakDir === 'P' ? streakWeight : 0) + 
                        pairTendProb.P * pairWeight + jumpProb.P * jumpWeight + 20;
            let scoreT = markovProb[2] * 0.2 + multiProb.T * 0.2 + 10;

            const maxScore = Math.max(scoreB, scoreP, scoreT);
            const finalPred = scoreB === maxScore ? 'B' : scoreP === maxScore ? 'P' : 'T';
            const finalName = finalPred === 'B' ? '🟥 莊勝' : finalPred === 'P' ? '🟦 閒勝' : '🟩 和局';
            const estAcc = 50 + (maxScore - 50) / 2;

            const risk = maxScore < 58 ? '高風險 - 建議停手' : 
                        maxScore < 65 ? '中風險 - 小額試試' : '低風險 - 可跟';

            const histAcc = pastPreds.length > 1 ? 
                (pastPreds.slice(0,-1).filter((p, i) => p === history[i+1].winner).length / (pastPreds.length-1) * 100) : 50;

            predDiv.innerHTML = `
                <div style="font-size:2.8rem; margin-bottom:10px;">${finalName}</div>
                <div style="font-size:1.8rem; color:#facc15;">自適應準率 ~${estAcc.toFixed(1)}%</div>
                <div style="margin-top:20px; font-size:1rem;">
                    馬可夫：莊 ${markovProb[0].toFixed(1)}% | 閒 ${markovProb[1].toFixed(1)}%<br>
                    多階序列：莊 ${multiProb.B.toFixed(1)}% | 閒 ${multiProb.P.toFixed(1)}%<br>
                    長龍：目前連勝 ${streak} 局
                </div>
                <div style="margin-top:15px; font-size:1rem; color:#22c55e;">
                    風險評級：${risk}
                </div>
                <div style="margin-top:10px; font-size:0.9rem; color:#9ca3af;">
                    歷史預測準率 ${histAcc.toFixed(1)}% • 長期~50% • 已學習 ${history.length} 筆
                </div>
            `;
        }

        function updateAll() {
            updateHistoryList();
            drawBigRoad();
            showPrediction();
        }

        function initButtons() {
            document.getElementById('btnB').addEventListener('click', () => addHand('B'));
            document.getElementById('btnP').addEventListener('click', () => addHand('P'));
            document.getElementById('btnT').addEventListener('click', () => addHand('T'));
            document.getElementById('btnUndo').addEventListener('click', undoLast);
            document.getElementById('btnClear').addEventListener('click', clearAll);
            document.getElementById('btnRecalc').addEventListener('click', showPrediction);
        }

        function addHand(winner) {
            history.push({winner});
            saveData();
            updateAll();
        }

        function undoLast() {
            if (history.length === 0) return;
            history.pop();
            saveData();
            updateAll();
        }

        function clearAll() {
            if (!confirm('確定清空所有歷史？')) return;
            history = [];
            pastPreds = [];
            markovAcc = multiAcc = streakAcc = pairTendAcc = jumpAcc = 0.5;
            saveData();
            updateAll();
        }

        loadData();
        initButtons();
        updateAll();
    </script>
</body>
</html>
